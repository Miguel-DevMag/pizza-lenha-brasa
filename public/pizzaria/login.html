<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Pizza Lenha &amp; Brasa</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800|poppins:500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">
  <div class="auth-split">
    <aside class="auth-panel auth-panel--brand" aria-hidden="true">
      <img class="auth-brand-bg" src="assets/logo-pizzaria.png" alt="" width="1200" height="900" decoding="async">
      <div class="auth-brand-inner">
       
    </aside>
    <div class="auth-panel auth-panel--form">
      <div class="auth-card">
        <h1>Entrar</h1>
        <p class="auth-lead">Navegação livre — sem verificação nem banco de dados. Os campos abaixo são só visuais.</p>
        <div class="auth-field">
          <label for="email">E-mail</label>
          <input type="text" id="email" name="email" placeholder="voce@email.com" autocomplete="off">
        </div>
        <div class="auth-field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="off">
        </div>
        <a href="inicio.html" class="auth-btn">Ir para o início</a>
        <p class="auth-links">Não tem conta? <a href="cadastro.html">Cadastro (visual)</a> · <a href="index.html">Voltar</a></p>
      </div>
    </div>
  </div>
</body>
</html>
