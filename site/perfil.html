<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meu perfil — Pizza Lenha &amp; Brasa</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800|poppins:500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-body">
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header__logo">
        <img src="assets/logo-pizzaria.png" alt="Logo Pizza Lenha e Brasa" width="36" height="36">
      </div>
      <h1 class="app-header__title">Pizzaria Lenha &amp; Brasa</h1>
    </header>

    <div class="app-subnav">
      <div class="app-subnav__left">
        <a href="inicio.html" class="app-subnav__back" aria-label="Voltar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </a>
        <span class="app-subnav__name">Pizza Lenha &amp; Brasa</span>
        <button type="button" class="app-subnav__filter">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
          </svg>
          Popularidade
        </button>
      </div>
      <nav class="app-subnav__links" aria-label="Páginas">
        <a href="sobre.html">Sobre</a>
        <span class="app-subnav__sep" aria-hidden="true">·</span>
        <a href="promocao.html">Promoção</a>
      </nav>
    </div>

    <main class="app-main" id="conteudo-principal">
      <div class="profile-page">
        <header class="profile-header">
          <div class="profile-header__avatar" aria-hidden="true">
            <img src="assets/logo-pizzaria.png" alt="" width="72" height="72">
          </div>
          <h2 class="profile-header__name">Cliente Lenha &amp; Brasa</h2>
          <p class="profile-header__email">contato@pizzarialenhabrasa.com.br</p>
        </header>

        <nav class="profile-menu" aria-label="Opções da conta">
          <a class="profile-menu__item" href="pedidos.html">
            <span>Pedidos recentes</span>
            <span class="profile-menu__chev" aria-hidden="true">›</span>
          </a>
          <a class="profile-menu__item" href="cardapio.html">
            <span>Cardápio</span>
            <span class="profile-menu__chev" aria-hidden="true">›</span>
          </a>
          <a class="profile-menu__item" href="promocao.html">
            <span>Promoções</span>
            <span class="profile-menu__chev" aria-hidden="true">›</span>
          </a>
          <a class="profile-menu__item" href="sobre.html">
            <span>Sobre a pizzaria</span>
            <span class="profile-menu__chev" aria-hidden="true">›</span>
          </a>
        </nav>

        <section class="profile-card" aria-labelledby="prefs-title">
          <h3 id="prefs-title" class="profile-card__title">Preferências</h3>
          <label class="profile-toggle">
            <span>Notificações de ofertas</span>
            <input type="checkbox" name="notif" checked disabled>
          </label>
          <label class="profile-toggle">
            <span>Lembrar endereço de entrega</span>
            <input type="checkbox" name="addr" disabled>
          </label>
          <p class="profile-card__hint">Ajustes completos em breve — apenas visual.</p>
        </section>

        <p class="profile-footer">
          <a href="login.html" class="profile-footer__link">Área de login</a>
        </p>
      </div>
    </main>

    <nav class="bottom-nav bottom-nav--floating" aria-label="Navegação principal">
      <a href="inicio.html">
        <span class="bottom-nav__icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1v-9.5z"/>
          </svg>
        </span>
        Início
      </a>
      <a href="cardapio.html">
        <span class="bottom-nav__icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 4v11c0 2 1.5 3 3 3h0c1.5 0 3-1 3-3V4"/>
            <path d="M6 4c0-1.5 1-3 3-3s3 1.5 3 3"/>
            <path d="M17 3v18"/>
            <path d="M15 21h4"/>
          </svg>
        </span>
        Cardápio
      </a>
      <a href="pedidos.html">
        <span class="bottom-nav__icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <path d="M9 5a2 2 0 012-2h2a2 2 0 012 2v0a2 2 0 01-2 2H11a2 2 0 01-2-2v0z"/>
            <path d="M9 12h6"/>
            <path d="M9 16h6"/>
          </svg>
        </span>
        Pedidos
      </a>
      <a href="perfil.html" aria-current="page">
        <span class="bottom-nav__icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        Perfil
      </a>
    </nav>
  </div>
</body>
</html>
