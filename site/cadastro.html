<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro — Pizza Lenha &amp; Brasa</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800|poppins:500,600,700" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">
  <div class="auth-split">
    <aside class="auth-panel auth-panel--brand" aria-hidden="true">
      <img class="auth-brand-bg" src="https://images.unsplash.com/photo-1571997478779-2adcbbe9ab2f?auto=format&amp;fit=crop&amp;w=1200&amp;q=80" alt="" width="1200" height="900" decoding="async">
      <div class="auth-brand-inner">
        <img src="assets/logo-pizzaria.png" alt="" width="200" height="200" class="auth-brand-logo">
        <p class="auth-brand-tagline">Junte-se e receba ofertas como a Tradizione Italiana.</p>
      </div>
    </aside>
    <div class="auth-panel auth-panel--form">
      <div class="auth-card">
        <h1>Criar conta</h1>
        <p class="auth-lead">Tela só para layout — nada é salvo. Use o botão para continuar navegando.</p>
        <div class="auth-field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome" autocomplete="off">
        </div>
        <div class="auth-field">
          <label for="email">E-mail</label>
          <input type="text" id="email" name="email" placeholder="voce@email.com" autocomplete="off">
        </div>
        <div class="auth-field">
          <label for="tel">Telefone</label>
          <input type="text" id="tel" name="tel" placeholder="(00) 00000-0000" autocomplete="off">
        </div>
        <div class="auth-field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Opcional" autocomplete="off">
        </div>
        <a href="inicio.html" class="auth-btn">Ir para o início</a>
        <p class="auth-links">Já tem conta? <a href="login.html">Entrar (visual)</a> · <a href="index.html">Voltar</a></p>
      </div>
    </div>
  </div>
</body>
</html>
